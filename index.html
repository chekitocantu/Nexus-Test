<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nexus Test — Simulador</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #13161d; --surface2: #1a1e28;
      --border: rgba(255,255,255,0.07); --accent: #4f8ef7; --accent2: #34d399;
      --text: #e2e8f0; --text-muted: rgba(255,255,255,0.38);
      --correct: #34d399; --wrong: #f87171;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .header { width: 100%; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 100; }
    .header-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; letter-spacing: -0.02em; }
    .header-logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .header-badge { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; letter-spacing: 0.06em; }
    .progress-text { font-size: 13px; color: var(--text-muted); }
    .progress-text span { color: var(--text); font-weight: 600; }
    .main { width: 100%; max-width: 820px; padding: 40px 24px 80px; display: flex; flex-direction: column; gap: 20px; }
    .exam-header { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px 28px; display: flex; align-items: center; justify-content: space-between; }
    .exam-title { font-size: 17px; font-weight: 600; }
    .exam-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .restart-btn { display: flex; align-items: center; gap: 8px; background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.3); border-radius: 8px; padding: 9px 16px; color: var(--accent); font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .restart-btn:hover { background: rgba(79,142,247,0.2); }
    .progress-bar-wrap { background: var(--surface2); border-radius: 100px; height: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 100px; transition: width 0.5s ease; }
    .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .question-top { padding: 24px 28px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 14px; }
    .q-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.2); border-radius: 6px; padding: 3px 8px; flex-shrink: 0; margin-top: 3px; }
    .q-text { font-size: 15px; font-weight: 400; line-height: 1.65; }
    .options { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
    mat-radio-button { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 9px; cursor: pointer; transition: all 0.18s; user-select: none; }
    mat-radio-button:hover { background: var(--surface2); border-color: rgba(255,255,255,0.15); }
    mat-radio-button.selected { border-color: var(--accent); background: rgba(79,142,247,0.08); }
    mat-radio-button.correct  { border-color: var(--correct) !important; background: rgba(52,211,153,0.08) !important; }
    mat-radio-button.wrong    { border-color: var(--wrong) !important; background: rgba(248,113,113,0.06) !important; }
    mat-radio-button.locked   { cursor: default; pointer-events: none; }
    .mat-radio-container { width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.18s; }
    mat-radio-button.selected .mat-radio-container { border-color: var(--accent); }
    mat-radio-button.correct  .mat-radio-container { border-color: var(--correct); }
    mat-radio-button.wrong    .mat-radio-container { border-color: var(--wrong); }
    .mat-radio-inner { width: 9px; height: 9px; border-radius: 50%; background: transparent; transition: all 0.18s; }
    mat-radio-button.selected .mat-radio-inner { background: var(--accent); }
    mat-radio-button.correct  .mat-radio-inner { background: var(--correct); }
    mat-radio-button.wrong    .mat-radio-inner { background: var(--wrong); }
    .mat-radio-label-content { font-size: 14px; line-height: 1.4; flex: 1; }
    .option-badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.2s; }
    .option-badge.show { opacity: 1; }
    .option-badge.correct { background: rgba(52,211,153,0.15); color: var(--correct); }
    .option-badge.wrong   { background: rgba(248,113,113,0.12); color: var(--wrong); }
    .question-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .feedback { font-size: 13px; }
    .feedback.correct { color: var(--correct); }
    .feedback.wrong   { color: var(--wrong); }
    .feedback.empty   { color: var(--text-muted); }
    .save-btn { background: var(--accent); border: none; border-radius: 8px; padding: 9px 22px; color: #fff; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
    .save-btn:hover { background: #6ba3f9; }
    .save-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: default; border: 1px solid var(--border); }
    .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 40px 28px; text-align: center; display: none; }
    .score-card.show { display: block; }
    .score-number { font-size: 72px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
    .score-label { font-size: 15px; color: var(--text-muted); margin-top: 10px; }
    .score-pct { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo"><div class="dot"></div>Nexus Test Simulator</div>
  <div class="header-badge">UANL · LOCAL</div>
  <span class="progress-text">Pregunta <span id="qCurrent">1</span> de <span id="qTotal">0</span></span>
</div>

<div class="main">
  <div class="exam-header">
    <div>
      <div class="exam-title">Examen de Práctica</div>
      <div class="exam-sub">Selecciona una opción y presiona Guardar para avanzar</div>
    </div>
    <button class="restart-btn" onclick="restart()">↺ Reiniciar</button>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>

  <div id="questionContainer"></div>

  <div class="score-card" id="scoreCard">
    <div class="score-number" id="scoreNum">—</div>
    <div class="score-label">respuestas correctas</div>
    <div class="score-pct" id="scorePct"></div>
  </div>
</div>

<script>
const QUESTIONS = [
  { text: "¿Cuál es la unidad básica de la vida?", options: ["El átomo", "La célula", "El tejido", "El órgano"], correct: 1 },
  { text: "¿Qué proceso usan las plantas para convertir luz solar en energía química?", options: ["Respiración celular", "Fermentación", "Fotosíntesis", "Osmosis"], correct: 2 },
  { text: "¿Cuál es el resultado de 15 × 8 − 40 ÷ 5?", options: ["108", "112", "116", "104"], correct: 2 },
  { text: "¿Qué molécula transporta el oxígeno en la sangre?", options: ["Glucosa", "Hemoglobina", "Insulina", "Aminoácido"], correct: 1 },
  { text: "En lógica proposicional, la negación de 'Todos los gatos son negros' es:", options: ["Ningún gato es negro", "Algunos gatos son negros", "Algunos gatos no son negros", "Todos los gatos son blancos"], correct: 2 },
  { text: "¿Cuál es la derivada de f(x) = 3x² + 2x − 5?", options: ["6x + 2", "3x + 2", "6x − 5", "3x² + 2"], correct: 0 },
  { text: "¿Qué tipo de silogismo concluye: 'Todo A es B', 'Todo B es C', luego 'Todo A es C'?", options: ["Silogismo disyuntivo", "Silogismo hipotético", "Silogismo categórico", "Modus tollens"], correct: 2 },
  { text: "Probabilidad de obtener número par al lanzar un dado de 6 caras:", options: ["1/3", "1/6", "2/3", "1/2"], correct: 3 },
  { text: "¿Cuál de los siguientes es un gas noble?", options: ["Hidrógeno", "Oxígeno", "Argón", "Nitrógeno"], correct: 2 },
  { text: "La Revolución Francesa comenzó en el año:", options: ["1776", "1789", "1804", "1815"], correct: 1 }
];

let current = 0, correctCount = 0, selected = null, saved = false;

function init() {
  current = 0; correctCount = 0; selected = null; saved = false;
  document.getElementById("qTotal").textContent = QUESTIONS.length;
  document.getElementById("scoreCard").classList.remove("show");
  renderQuestion();
}

function renderQuestion() {
  selected = null; saved = false;
  const q = QUESTIONS[current];
  document.getElementById("qCurrent").textContent = current + 1;
  document.getElementById("progressBar").style.width = `${(current / QUESTIONS.length) * 100}%`;

  const optionsHTML = q.options.map((opt, oi) => `
    <mat-radio-button id="rb-${oi}" onclick="selectOption(${oi})">
      <div class="mat-radio-container"><div class="mat-radio-inner"></div></div>
      <span class="mat-radio-label-content">${opt}</span>
      <span class="option-badge" id="badge-${oi}"></span>
    </mat-radio-button>
  `).join("");

  document.getElementById("questionContainer").innerHTML = `
    <div class="question-card">
      <div class="question-top">
        <div class="q-num">P${String(current+1).padStart(2,"0")}</div>
        <div class="q-text">${q.text}</div>
      </div>
      <div class="options">${optionsHTML}</div>
      <div class="question-footer">
        <div class="feedback empty" id="feedback">Selecciona una opción</div>
        <button class="save-btn" id="saveBtn" onclick="saveAnswer()" disabled>Guardar</button>
      </div>
    </div>
  `;
}

function selectOption(oi) {
  if (saved) return;
  selected = oi;
  document.querySelectorAll("mat-radio-button").forEach(rb => rb.classList.remove("selected"));
  document.getElementById(`rb-${oi}`).classList.add("selected");
  document.getElementById("saveBtn").disabled = false;
  document.getElementById("feedback").textContent = "Presiona Guardar para confirmar";
  document.getElementById("feedback").className = "feedback empty";
}

function saveAnswer() {
  if (selected === null || saved) return;
  saved = true;
  const q = QUESTIONS[current];
  const isCorrect = selected === q.correct;
  if (isCorrect) correctCount++;

  document.querySelectorAll("mat-radio-button").forEach(rb => rb.classList.add("locked"));

  document.getElementById(`rb-${q.correct}`).classList.add("correct");
  const cb = document.getElementById(`badge-${q.correct}`);
  cb.textContent = "Correcta"; cb.className = "option-badge correct show";

  if (!isCorrect) {
    document.getElementById(`rb-${selected}`).classList.add("wrong");
    const wb = document.getElementById(`badge-${selected}`);
    wb.textContent = "Incorrecta"; wb.className = "option-badge wrong show";
  }

  const fb = document.getElementById("feedback");
  fb.className = `feedback ${isCorrect ? "correct" : "wrong"}`;
  fb.textContent = isCorrect ? "✓ Correcto" : `✗ Incorrecto — Era: ${q.options[q.correct]}`;

  const btn = document.getElementById("saveBtn");
  const isLast = current === QUESTIONS.length - 1;
  btn.textContent = isLast ? "Finalizar" : "Siguiente →";
  btn.onclick = isLast ? showScore : nextQuestion;
}

function nextQuestion() { current++; renderQuestion(); window.scrollTo({ top: 0, behavior: "smooth" }); }

function showScore() {
  document.getElementById("questionContainer").innerHTML = "";
  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("qCurrent").textContent = QUESTIONS.length;
  const pct = Math.round((correctCount / QUESTIONS.length) * 100);
  document.getElementById("scoreNum").textContent = `${correctCount}/${QUESTIONS.length}`;
  document.getElementById("scorePct").textContent = `${pct}% de respuestas correctas`;
  document.getElementById("scoreCard").classList.add("show");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function restart() { init(); window.scrollTo({ top: 0, behavior: "smooth" }); }
init();
</script>
</body>
</html>
