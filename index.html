<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nexus Test — Simulador</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161d;
      --surface2: #1a1e28;
      --border: rgba(255,255,255,0.07);
      --accent: #4f8ef7;
      --accent2: #34d399;
      --text: #e2e8f0;
      --text-muted: rgba(255,255,255,0.38);
      --correct: #34d399;
      --wrong: #f87171;
      --radio-size: 20px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 15px; letter-spacing: -0.02em;
    }
    .header-logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .header-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 8px;
      letter-spacing: 0.06em;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .progress-text { font-size: 13px; color: var(--text-muted); }
    .progress-text span { color: var(--text); font-weight: 600; }

    /* ── MAIN ── */
    .main {
      width: 100%; max-width: 820px;
      padding: 40px 24px 80px;
      display: flex; flex-direction: column; gap: 24px;
    }

    /* ── EXAM HEADER ── */
    .exam-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 28px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .exam-title { font-size: 18px; font-weight: 600; }
    .exam-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .restart-btn {
      display: flex; align-items: center; gap: 8px;
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.3);
      border-radius: 8px; padding: 9px 16px;
      color: var(--accent); font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.2s;
    }
    .restart-btn:hover { background: rgba(79,142,247,0.2); }
    .restart-btn svg { width: 15px; height: 15px; }

    /* ── PROGRESS BAR ── */
    .progress-bar-wrap {
      background: var(--surface2);
      border-radius: 100px; height: 4px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px; transition: width 0.5s ease;
    }

    /* ── QUESTION CARD ── */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .question-card.answered-correct { border-color: rgba(52,211,153,0.3); }
    .question-card.answered-wrong   { border-color: rgba(248,113,113,0.2); }

    .question-top {
      padding: 22px 28px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 14px;
    }
    .q-num {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--accent);
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 6px; padding: 3px 8px;
      flex-shrink: 0; margin-top: 2px;
    }
    .q-text { font-size: 15px; font-weight: 400; line-height: 1.6; }

    /* ── OPTIONS (mat-radio-button style) ── */
    .options { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }

    mat-radio-button {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }
    mat-radio-button:hover { background: var(--surface2); border-color: rgba(255,255,255,0.15); }
    mat-radio-button.selected { border-color: var(--accent); background: rgba(79,142,247,0.08); }
    mat-radio-button.correct  { border-color: var(--correct) !important; background: rgba(52,211,153,0.08) !important; }
    mat-radio-button.wrong    { border-color: var(--wrong) !important; background: rgba(248,113,113,0.06) !important; }

    .mat-radio-container {
      width: var(--radio-size); height: var(--radio-size);
      border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.18s;
    }
    mat-radio-button.selected .mat-radio-container { border-color: var(--accent); }
    mat-radio-button.correct  .mat-radio-container { border-color: var(--correct); }
    mat-radio-button.wrong    .mat-radio-container { border-color: var(--wrong); }

    .mat-radio-inner {
      width: 9px; height: 9px; border-radius: 50%;
      background: transparent; transition: all 0.18s;
    }
    mat-radio-button.selected .mat-radio-inner { background: var(--accent); }
    mat-radio-button.correct  .mat-radio-inner { background: var(--correct); }
    mat-radio-button.wrong    .mat-radio-inner { background: var(--wrong); }

    .mat-radio-label-content {
      font-size: 14px; line-height: 1.4; flex: 1;
    }

    .option-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px; padding: 2px 6px;
      border-radius: 4px; flex-shrink: 0;
      opacity: 0; transition: opacity 0.2s;
    }
    .option-badge.show { opacity: 1; }
    .option-badge.correct { background: rgba(52,211,153,0.15); color: var(--correct); }
    .option-badge.wrong   { background: rgba(248,113,113,0.12); color: var(--wrong); }

    /* ── RESULT FOOTER ── */
    .question-footer {
      padding: 0 28px;
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s;
    }
    .question-footer.show { max-height: 80px; padding: 14px 28px; }
    .feedback {
      font-size: 13px; display: flex; align-items: center; gap: 8px;
    }
    .feedback.correct { color: var(--correct); }
    .feedback.wrong   { color: var(--wrong); }

    /* ── SCORE CARD ── */
    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 28px;
      text-align: center;
      display: none;
    }
    .score-card.show { display: block; }
    .score-number {
      font-size: 64px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .score-label { font-size: 14px; color: var(--text-muted); margin-top: 8px; }
    .score-detail { font-size: 13px; color: var(--text-muted); margin-top: 16px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="dot"></div>
    Nexus Test Simulator
  </div>
  <div class="header-badge">UANL · TEST LOCAL</div>
  <div class="header-right">
    <span class="progress-text">Respondidas: <span id="answeredCount">0</span> / <span id="totalCount">0</span></span>
  </div>
</div>

<div class="main">
  <div class="exam-header">
    <div>
      <div class="exam-title">Examen de Práctica</div>
      <div class="exam-sub">Simulador de estructura Nexus · Responde con la extensión o manualmente</div>
    </div>
    <button class="restart-btn" onclick="restart()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      Reiniciar
    </button>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>

  <div id="questionsContainer"></div>

  <div class="score-card" id="scoreCard">
    <div class="score-number" id="scoreNum">—</div>
    <div class="score-label">respuestas correctas</div>
    <div class="score-detail" id="scoreDetail"></div>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    text: "¿Cuál es la unidad básica de la vida?",
    options: ["El átomo", "La célula", "El tejido", "El órgano"],
    correct: 1
  },
  {
    text: "¿Qué proceso usan las plantas para convertir luz solar en energía química?",
    options: ["Respiración celular", "Fermentación", "Fotosíntesis", "Osmosis"],
    correct: 2
  },
  {
    text: "¿Cuál es el resultado de la siguiente operación: 15 × 8 − 40 ÷ 5?",
    options: ["108", "112", "116", "104"],
    correct: 2
  },
  {
    text: "¿Qué molécula transporta el oxígeno en la sangre?",
    options: ["Glucosa", "Hemoglobina", "Insulina", "Aminoácido"],
    correct: 1
  },
  {
    text: "En lógica proposicional, la negación de 'Todos los gatos son negros' es:",
    options: [
      "Ningún gato es negro",
      "Algunos gatos son negros",
      "Algunos gatos no son negros",
      "Todos los gatos son blancos"
    ],
    correct: 2
  },
  {
    text: "¿Cuál es la derivada de f(x) = 3x² + 2x − 5?",
    options: ["6x + 2", "3x + 2", "6x − 5", "3x² + 2"],
    correct: 0
  },
  {
    text: "¿Qué tipo de silogismo concluye que si 'Todo A es B' y 'Todo B es C', entonces 'Todo A es C'?",
    options: ["Silogismo disyuntivo", "Silogismo hipotético", "Silogismo categórico", "Modus tollens"],
    correct: 2
  },
  {
    text: "¿Cuál es el valor de la probabilidad de obtener un número par al lanzar un dado de 6 caras?",
    options: ["1/3", "1/6", "2/3", "1/2"],
    correct: 3
  },
  {
    text: "¿Cuál de los siguientes es un gas noble?",
    options: ["Hidrógeno", "Oxígeno", "Argón", "Nitrógeno"],
    correct: 2
  },
  {
    text: "La Revolución Francesa comenzó en el año:",
    options: ["1776", "1789", "1804", "1815"],
    correct: 1
  }
];

let answered = 0;
let correct = 0;
let total = QUESTIONS.length;

function buildQuestions() {
  const container = document.getElementById("questionsContainer");
  container.innerHTML = "";
  answered = 0; correct = 0;
  document.getElementById("answeredCount").textContent = 0;
  document.getElementById("totalCount").textContent = total;
  document.getElementById("progressBar").style.width = "0%";
  document.getElementById("scoreCard").classList.remove("show");

  QUESTIONS.forEach((q, qi) => {
    const card = document.createElement("div");
    card.className = "question-card";
    card.id = `card-${qi}`;

    const letters = ["A", "B", "C", "D"];

    const optionsHTML = q.options.map((opt, oi) => `
      <mat-radio-button id="rb-${qi}-${oi}" onclick="selectOption(${qi}, ${oi})">
        <div class="mat-radio-container">
          <div class="mat-radio-inner"></div>
        </div>
        <span class="mat-radio-label-content">${opt}</span>
        <span class="option-badge" id="badge-${qi}-${oi}"></span>
      </mat-radio-button>
    `).join("");

    card.innerHTML = `
      <div class="question-top">
        <div class="q-num">P${String(qi+1).padStart(2,"0")}</div>
        <div class="q-text">${q.text}</div>
      </div>
      <div class="options">${optionsHTML}</div>
      <div class="question-footer" id="footer-${qi}">
        <div class="feedback" id="feedback-${qi}"></div>
      </div>
    `;

    container.appendChild(card);
  });
}

function selectOption(qi, oi) {
  const card = document.getElementById(`card-${qi}`);
  if (card.dataset.answered) return; // ya respondida

  const q = QUESTIONS[qi];
  const isCorrect = oi === q.correct;

  // Marcar opcion seleccionada
  card.querySelectorAll("mat-radio-button").forEach(rb => rb.classList.remove("selected"));
  document.getElementById(`rb-${qi}-${oi}`).classList.add("selected");

  // Mostrar resultado
  setTimeout(() => {
    // Colorear correcta e incorrecta
    document.getElementById(`rb-${qi}-${q.correct}`).classList.add("correct");
    const correctBadge = document.getElementById(`badge-${qi}-${q.correct}`);
    correctBadge.textContent = "Correcta";
    correctBadge.className = "option-badge correct show";

    if (!isCorrect) {
      document.getElementById(`rb-${qi}-${oi}`).classList.add("wrong");
      const wrongBadge = document.getElementById(`badge-${qi}-${oi}`);
      wrongBadge.textContent = "Incorrecta";
      wrongBadge.className = "option-badge wrong show";
    }

    card.classList.add(isCorrect ? "answered-correct" : "answered-wrong");
    card.dataset.answered = "1";

    // Feedback
    const footer = document.getElementById(`footer-${qi}`);
    const feedback = document.getElementById(`feedback-${qi}`);
    footer.classList.add("show");
    if (isCorrect) {
      feedback.className = "feedback correct";
      feedback.textContent = "✓ Correcto";
    } else {
      feedback.className = "feedback wrong";
      feedback.textContent = `✗ Incorrecto — La respuesta era: ${q.options[q.correct]}`;
    }

    answered++;
    if (isCorrect) correct++;
    document.getElementById("answeredCount").textContent = answered;
    document.getElementById("progressBar").style.width = `${(answered/total)*100}%`;

    if (answered === total) showScore();
  }, 200);
}

function showScore() {
  const scoreCard = document.getElementById("scoreCard");
  const pct = Math.round((correct / total) * 100);
  document.getElementById("scoreNum").textContent = `${correct}/${total}`;
  document.getElementById("scoreDetail").textContent = `${pct}% de respuestas correctas`;
  scoreCard.classList.add("show");
  scoreCard.scrollIntoView({ behavior: "smooth", block: "center" });
}

function restart() {
  buildQuestions();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

buildQuestions();
</script>
</body>
</html>
